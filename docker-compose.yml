services:
  mongo:
    image: mongo:7
    container_name: zap-automation-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: zap_automation
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: zap-automation-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    image: python:3.12-slim
    container_name: zap-automation-api
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      - mongo
      - redis

volumes:
  mongo_data:
